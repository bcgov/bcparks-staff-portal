fullnameOverride: crunchy-postgres

postgresVersion: 17

instances:
  replicas: 1
  dataVolumeClaimSpec:
    storage: 2Gi
  requests:
    cpu: 100m

pgBackRest:
  repos:
    volume:
      storage: 1Gi

proxy:
  pgBouncer:
    replicas: 1

pgmonitor:
  namespace: a7dd13 #The high level namespace of your project without the -tools -dev, etc part.
